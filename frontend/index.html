<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ArchInit</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body>
<div class="shell">

  <!-- ── Sidebar ── -->
  <aside class="sidebar">
    <div class="sidebar-logo"><i class="fa-brands fa-linux"></i></div>
    <div class="sidebar-steps">
      <div class="step-node active" title="Profil"><i class="fa-solid fa-user"></i></div>
      <div class="step-connector"></div>
      <div class="step-node" title="Masaüstü"><i class="fa-solid fa-display"></i></div>
      <div class="step-connector"></div>
      <div class="step-node" title="Bulut"><i class="fa-solid fa-cloud"></i></div>
    </div>
  </aside>

  <!-- ── Main ── -->
  <div class="content">

    <div class="top-bar">
      <span class="top-bar-title">ArchInit</span>
      <div class="progress-pill">
        <div class="progress-track">
          <div class="progress-fill" style="width:33%"></div>
        </div>
        <span class="progress-label">1 / 3</span>
      </div>
    </div>

    <main class="page">

      <div class="section-head up">
        <span class="section-icon">👤</span>
        <h1>Sen kimsin?</h1>
      </div>

      <div class="profile-grid">

        <button class="pcard active up d1" data-profile="gunluk" onclick="pick(this)">
          <div class="pcard-dot"><i class="fa-solid fa-check"></i></div>
          <div class="pcard-icon-box">🏠</div>
          <span class="pcard-label">Günlük</span>
        </button>

        <button class="pcard up d2" data-profile="yazilimci" onclick="pick(this)">
          <div class="pcard-dot"><i class="fa-solid fa-check"></i></div>
          <div class="pcard-icon-box">💻</div>
          <span class="pcard-label">Yazılımcı</span>
        </button>

        <button class="pcard up d3" data-profile="ozel" onclick="pick(this)">
          <div class="pcard-dot"><i class="fa-solid fa-check"></i></div>
          <div class="pcard-icon-box">🎛️</div>
          <span class="pcard-label">Özel</span>
        </button>

      </div>

      <div class="bottom-controls up d4">
        <label class="toggle-row">
          <div class="pill">
            <input type="checkbox" id="google-toggle" checked>
            <span class="track"></span>
          </div>
          <i class="fa-brands fa-google" style="color:#4285f4;font-size:1rem"></i>
          &nbsp;Google
        </label>
        <button class="btn-primary" id="btn-next">
          <i class="fa-solid fa-arrow-right"></i>
        </button>
      </div>

    </main>
  </div>

</div>
<script type="module" src="/src/main.js"></script>
</body>
</html>
